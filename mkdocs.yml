    - Baja California Sur: camps/mexico/bcs.md
    - Guanajuato: camps/mexico/gto.md
    - Jalisco: camps/mexico/jal.md
    - State of Mexico: camps/mexico/mex.md
- Reference:
  - Grounding Rules: reference/grounding-rules.md
  - Output Schema: reference/output-schema.md
  - Status Codes: reference/status-codes.md
markdown_extensions:
- admonition
- attr_list
- def_list
- tables
- toc:
    permalink: true
plugins:
- search
