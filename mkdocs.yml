site_name: The Great Camp Crawl
site_description: Breadth-first overnight camp research across the US, Canada, and Mexico
site_url: https://jhwodchuck.github.io/The-Great-Camp-Crawl/
repo_url: https://github.com/jhwodchuck/The-Great-Camp-Crawl
repo_name: jhwodchuck/The-Great-Camp-Crawl

theme:
  name: material
  logo: assets/logo.svg
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: docs/index.md
  - Scope: docs/scope.md
  - Methodology: docs/methodology.md
  - Workflow: docs/workflow.md
  - Coverage:
      - United States: docs/coverage/united-states.md
      - Canada: docs/coverage/canada.md
      - Mexico: docs/coverage/mexico.md
  - Venue Records:
      - Overview: docs/camps/index.md
      - US Maryland: docs/camps/us/md.md
      - Canada Ontario: docs/camps/canada/on.md
      - Mexico Jalisco: docs/camps/mexico/jal.md
  - Reference:
      - Grounding Rules: docs/reference/grounding-rules.md
      - Output Schema: docs/reference/output-schema.md
      - Status Codes: docs/reference/status-codes.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true

plugins:
  - search
