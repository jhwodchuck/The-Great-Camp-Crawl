site_name: The Great Camp Crawl
site_description: Breadth-first overnight camp research across the US, Canada, and Mexico
site_url: https://jhwodchuck.github.io/The-Great-Camp-Crawl/
repo_url: https://github.com/jhwodchuck/The-Great-Camp-Crawl
repo_name: jhwodchuck/The-Great-Camp-Crawl

theme:
  name: material
  logo: assets/logo.svg
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: docs/index.md
  - Methodology: docs/methodology.md
  - Grounding Rules: docs/reference/grounding-rules.md
  - Output Schema: docs/reference/output-schema.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true

plugins:
  - search
