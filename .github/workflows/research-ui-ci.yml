name: Research UI CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements-discovery.txt
          pip install -r apps/research-ui/backend/requirements.txt

      - name: Run pytest
        run: python -m pytest -q

  frontend-quality:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/research-ui/frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/research-ui/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint
        env:
          NEXT_PUBLIC_API_URL: /backend

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: /backend
